name: Project Board Automation

on:
  workflow_call:
    inputs:
      project-number:
        description: The GitHub ProjectV2 number
        required: true
        type: number
      add-trigger:
        description: >-
          When to add issues to the project board.
          "accepted-label": when the "accepted" label is applied.
          "opened": when the issue is opened.
        required: true
        type: string
      exclude-labels:
        description: JSON array of labels that exclude an issue from automation
        required: false
        type: string
        default: '["epic-task"]'
      priority-labels:
        description: JSON array of labels that promote an issue from Backlog to Ready
        required: false
        type: string
        default: '["p-low","p-medium","p-high","p-critical"]'
    secrets:
      project-token:
        description: A PAT with project write permissions
        required: true

jobs:
  add-to-project:
    if: >-
      github.event_name == 'issues'
      && (
        (inputs.add-trigger == 'accepted-label'
          && github.event.action == 'labeled'
          && github.event.label.name == 'accepted')
        || (inputs.add-trigger == 'opened'
          && github.event.action == 'opened')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Check exclude labels
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const excludeLabels = ${{ inputs.exclude-labels }};
            const issueLabels = ${{ toJson(github.event.issue.labels.*.name) }};
            const excluded = issueLabels.some((l) => excludeLabels.includes(l));
            core.setOutput("excluded", excluded.toString());

      - name: Add to project and set status
        if: steps.check.outputs.excluded == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.project-token }}
          script: |
            const projectNumber = ${{ inputs.project-number }};

            const { organization } = await github.graphql(
              `
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    field(name: "Status") {
                      ... on ProjectV2SingleSelectField {
                        id
                        options { id name }
                      }
                    }
                  }
                }
              }
              `,
              { org: context.repo.owner, number: projectNumber },
            );

            const project = organization.projectV2;
            const field = project.field;

            const { addProjectV2ItemById } = await github.graphql(
              `
              mutation($project: ID!, $issue: ID!) {
                addProjectV2ItemById(input: {projectId: $project, contentId: $issue}) {
                  item { id }
                }
              }
              `,
              { project: project.id, issue: "${{ github.event.issue.node_id }}" },
            );

            const labels = ${{ toJson(github.event.issue.labels.*.name) }};
            const priorityLabels = ${{ inputs.priority-labels }};
            const hasPriority = labels.some((l) => priorityLabels.includes(l));
            const statusName = hasPriority ? "Ready" : "Backlog";
            const statusId = field.options.find((o) => o.name === statusName).id;

            await github.graphql(
              `
              mutation($project: ID!, $item: ID!, $field: ID!, $value: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $project
                  itemId: $item
                  fieldId: $field
                  value: {singleSelectOptionId: $value}
                }) {
                  projectV2Item { id }
                }
              }
              `,
              {
                project: project.id,
                item: addProjectV2ItemById.item.id,
                field: field.id,
                value: statusId,
              },
            );

  promote-to-ready:
    if: >-
      github.event_name == 'issues'
      && github.event.action == 'labeled'
    runs-on: ubuntu-latest
    steps:
      - name: Check if priority label
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const priorityLabels = ${{ inputs.priority-labels }};
            const labelName = "${{ github.event.label.name }}";
            core.setOutput("is_priority", priorityLabels.includes(labelName).toString());

      - name: Move to Ready
        if: steps.check.outputs.is_priority == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.project-token }}
          script: |
            const projectNumber = ${{ inputs.project-number }};

            const { node } = await github.graphql(
              `
              query($issueId: ID!) {
                node(id: $issueId) {
                  ... on Issue {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project { number }
                        fieldValueByName(name: "Status") {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
              `,
              { issueId: "${{ github.event.issue.node_id }}" },
            );

            const item = node.projectItems.nodes.find(
              (n) => n.project.number === projectNumber && n.fieldValueByName?.name === "Backlog",
            );
            if (!item) return;

            const { organization } = await github.graphql(
              `
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    field(name: "Status") {
                      ... on ProjectV2SingleSelectField {
                        id
                        options { id name }
                      }
                    }
                  }
                }
              }
              `,
              { org: context.repo.owner, number: projectNumber },
            );

            const project = organization.projectV2;
            const field = project.field;
            const readyId = field.options.find((o) => o.name === "Ready").id;

            await github.graphql(
              `
              mutation($project: ID!, $item: ID!, $field: ID!, $value: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $project
                  itemId: $item
                  fieldId: $field
                  value: {singleSelectOptionId: $value}
                }) {
                  projectV2Item { id }
                }
              }
              `,
              {
                project: project.id,
                item: item.id,
                field: field.id,
                value: readyId,
              },
            );

  move-to-in-progress:
    if: github.event_name == 'create' && github.event.ref_type == 'branch'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve issue from branch name
        id: issue
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.project-token }}
          script: |
            const excludeLabels = ${{ inputs.exclude-labels }};

            const ref = context.payload.ref;
            const suffix = ref.includes("/") ? ref.split("/").pop() : ref;
            const match = suffix.match(/^(\d+)/);
            if (!match) return;

            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(match[1]),
            });

            const labels = issue.labels.map((l) => l.name);
            if (labels.includes("epic") || labels.some((l) => excludeLabels.includes(l))) return;

            core.setOutput("node_id", issue.node_id);

      - name: Move to In Progress
        if: steps.issue.outputs.node_id
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.project-token }}
          script: |
            const projectNumber = ${{ inputs.project-number }};

            const { node } = await github.graphql(
              `
              query($issueId: ID!) {
                node(id: $issueId) {
                  ... on Issue {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project { number }
                        fieldValueByName(name: "Status") {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                          }
                        }
                      }
                    }
                  }
                }
              }
              `,
              { issueId: "${{ steps.issue.outputs.node_id }}" },
            );

            const item = node.projectItems.nodes.find(
              (n) =>
                n.project.number === projectNumber &&
                (n.fieldValueByName?.name === "Backlog" ||
                  n.fieldValueByName?.name === "Ready"),
            );
            if (!item) return;

            const { organization } = await github.graphql(
              `
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    field(name: "Status") {
                      ... on ProjectV2SingleSelectField {
                        id
                        options { id name }
                      }
                    }
                  }
                }
              }
              `,
              { org: context.repo.owner, number: projectNumber },
            );

            const project = organization.projectV2;
            const field = project.field;
            const inProgressId = field.options.find((o) => o.name === "In progress").id;

            await github.graphql(
              `
              mutation($project: ID!, $item: ID!, $field: ID!, $value: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $project
                  itemId: $item
                  fieldId: $field
                  value: {singleSelectOptionId: $value}
                }) {
                  projectV2Item { id }
                }
              }
              `,
              { project: project.id, item: item.id, field: field.id, value: inProgressId },
            );
